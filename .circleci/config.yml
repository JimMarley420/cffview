version: 2.1

orbs:
  windows: circleci/windows@5.0

jobs:
  build:
    executor:
      name: windows/default

    steps:
      - checkout

      - run:
          name: Install .NET 10 SDK
          shell: powershell.exe
          command: |
            $ErrorActionPreference = "Stop"
            Invoke-WebRequest -Uri "https://dot.net/v1/dotnet-install.ps1" -OutFile "dotnet-install.ps1"
            & .\dotnet-install.ps1 -Channel 10.0 -InstallDir "C:\dotnet10"
            if ($LASTEXITCODE -ne 0) { throw "SDK install failed" }

      - run:
          name: Verify .NET 10 SDK
          shell: powershell.exe
          command: |
            & "C:\dotnet10\dotnet.exe" --version

      - run:
          name: Restore
          shell: powershell.exe
          command: |
            & "C:\dotnet10\dotnet.exe" restore cffview.sln

      - run:
          name: Compile
          shell: powershell.exe
          command: |
            $env:PATH = "C:\dotnet10;$env:PATH"
            & "C:\dotnet10\dotnet.exe" build cffview.sln --configuration Release

      - persist_to_workspace:
          root: .
          paths:
            - cffview/bin/Release
            - cffview.tests/bin/Release

  test:
    executor:
      name: windows/default

    steps:
      - checkout

      - run:
          name: Install .NET 10 SDK
          shell: powershell.exe
          command: |
            $ErrorActionPreference = "Stop"
            Invoke-WebRequest -Uri "https://dot.net/v1/dotnet-install.ps1" -OutFile "dotnet-install.ps1"
            & .\dotnet-install.ps1 -Channel 10.0 -InstallDir "C:\dotnet10"
            if ($LASTEXITCODE -ne 0) { throw "SDK install failed" }

      - run:
          name: Verify .NET 10 SDK
          shell: powershell.exe
          command: |
            & "C:\dotnet10\dotnet.exe" --version

      - run:
          name: Run Tests
          shell: powershell.exe
          command: |
            $env:PATH = "C:\dotnet10;$env:PATH"
            & "C:\dotnet10\dotnet.exe" test cffview.tests\cffview.tests.csproj --configuration Release --verbosity normal

  publish:
    executor:
      name: windows/default

    steps:
      - checkout

      - run:
          name: Install .NET 10 SDK
          shell: powershell.exe
          command: |
            $ErrorActionPreference = "Stop"
            Invoke-WebRequest -Uri "https://dot.net/v1/dotnet-install.ps1" -OutFile "dotnet-install.ps1"
            & .\dotnet-install.ps1 -Channel 10.0 -InstallDir "C:\dotnet10"
            if ($LASTEXITCODE -ne 0) { throw "SDK install failed" }

      - run:
          name: Verify .NET 10 SDK
          shell: powershell.exe
          command: |
            & "C:\dotnet10\dotnet.exe" --version

      - run:
          name: Publish
          shell: powershell.exe
          command: |
            $env:PATH = "C:\dotnet10;$env:PATH"
            & "C:\dotnet10\dotnet.exe" publish cffview\cffview.csproj -c Release -r win-x64 --self-contained false -o publish

      - store_artifacts:
          path: publish
          destination: publish

workflows:
  build_workflow:
    jobs:
      - build
      - test:
          requires:
            - build
      - publish:
          requires:
            - test