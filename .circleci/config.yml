version: 2.1

orbs:
  windows: circleci/windows@5.0

jobs:
  build:
    executor:
      name: windows/default

    steps:
      - checkout

      - run:
          name: Install .NET 10 SDK
          shell: powershell.exe
          command: |
            Invoke-WebRequest https://dot.net/v1/dotnet-install.ps1 -OutFile dotnet-install.ps1
            ./dotnet-install.ps1 -Channel 10.0
            $env:PATH += ";$env:USERPROFILE\.dotnet"
            [Environment]::SetEnvironmentVariable("PATH", $env:PATH, [EnvironmentVariableTarget]::Machine)

      - run:
          name: Verify SDK
          command: dotnet --info

      - restore_cache:
          keys:
            - nuget-cache-{{ checksum "CFFView.sln" }}
            - nuget-cache-

      - run:
          name: Restore
          command: dotnet restore CFFView.sln

      - save_cache:
          paths:
            - C:\Users\circleci\.nuget\packages
          key: nuget-cache-{{ checksum "CFFView.sln" }}

      - run:
          name: Build
          command: dotnet build CFFView.sln --configuration Release --no-restore

      - run:
          name: Publish
          command: dotnet publish CFFView.sln -c Release -r win-x64 --self-contained false -o publish

      - store_artifacts:
          path: publish
          destination: publish

workflows:
  build_workflow:
    jobs:
      - build