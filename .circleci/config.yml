version: 2.1

orbs:
  windows: circleci/windows@5.0

jobs:
  build:
    executor:
      name: windows/default

    steps:
      - checkout

      - run:
          name: Install .NET 10 SDK
          shell: powershell.exe
          command: |
            Invoke-WebRequest https://dot.net/v1/dotnet-install.ps1 -OutFile dotnet-install.ps1
            ./dotnet-install.ps1 -Channel 10.0

      - run:
          name: Verify SDK
          command: dotnet --info

      - restore_cache:
          keys:
            - nuget-cache-{{ checksum "cffview.sln" }}
            - nuget-cache-

      - run:
          name: Restore
          command: dotnet restore cffview.sln

      - save_cache:
          paths:
            - C:\Users\circleci\.nuget\packages
          key: nuget-cache-{{ checksum "cffview.sln" }}

      - run:
          name: Build
          command: dotnet build cffview.sln --configuration Release --no-restore

      - persist_to_workspace:
          root: .
          paths:
            - cffview/bin/Release
            - cffview.tests/bin/Release

  test:
    executor:
      name: windows/default

    steps:
      - checkout

      - run:
          name: Install .NET 10 SDK
          shell: powershell.exe
          command: |
            Invoke-WebRequest https://dot.net/v1/dotnet-install.ps1 -OutFile dotnet-install.ps1
            ./dotnet-install.ps1 -Channel 10.0

      - run:
          name: Restore packages
          command: dotnet restore cffview.sln

      - run:
          name: Run Tests
          command: dotnet test cffview.tests\cffview.tests.csproj --configuration Release --verbosity normal

  publish:
    executor:
      name: windows/default

    steps:
      - checkout

      - run:
          name: Install .NET 10 SDK
          shell: powershell.exe
          command: |
            Invoke-WebRequest https://dot.net/v1/dotnet-install.ps1 -OutFile dotnet-install.ps1
            ./dotnet-install.ps1 -Channel 10.0

      - run:
          name: Publish
          command: dotnet publish cffview\cffview.csproj -c Release -r win-x64 --self-contained false -o publish

      - store_artifacts:
          path: publish
          destination: publish

workflows:
  build_workflow:
    jobs:
      - build:
          filters:
            branches:
              only: main
      - test:
          requires:
            - build
      - publish:
          requires:
            - test
          filters:
            branches:
              only: main